# EDA Desktop Application - CI/CD Pipeline
# 支持 Windows/Linux 双平台构建

name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  release:
    types: [published]

env:
  BUILD_TYPE: Release
  QT_VERSION: '5.15.2'

jobs:
  # ============================================
  # 代码检查 (仅 PR 触发)
  # ============================================
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check C++ Code Style
        run: |
          find . -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | grep -v build | xargs clang-format --style=file --dry-run --Werror || true
        continue-on-error: true

      - name: Check CMake Format
        uses: cheshirekow/cmake-format-action@v0.0.4
        continue-on-error: true

  # ============================================
  # Windows 构建
  # ============================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qt5compat'
          setup-python: false

      - name: Configure CMake
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX=install `
            -DPET_CORE_BUILD_TESTS=ON
        working-directory: PetEduComplete

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
        working-directory: PetEduComplete

      - name: Install
        run: cmake --install build --config ${{ env.BUILD_TYPE }}
        working-directory: PetEduComplete

      - name: Run Tests
        run: ctest --test-dir build -C ${{ env.BUILD_TYPE }} --output-on-failure
        working-directory: PetEduComplete
        continue-on-error: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pet-edu-windows
          path: PetEduComplete/install/
          retention-days: 30

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-windows
          path: PetEduComplete/build/CMakeFiles/CMakeOutput.log
          retention-days: 7

  # ============================================
  # Linux 构建
  # ============================================
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt5-default \
            qtbase5-dev \
            qt5-qmake \
            libqt5widgets5 \
            libqt5sql5 \
            libqt5sql5-sqlite \
            cmake \
            g++ \
            make

      - name: Setup Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qt5compat'
          setup-python: false

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=install \
            -DPET_CORE_BUILD_TESTS=ON
        working-directory: PetEduComplete

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)
        working-directory: PetEduComplete

      - name: Install
        run: cmake --install build --config ${{ env.BUILD_TYPE }}
        working-directory: PetEduComplete

      - name: Run Tests
        run: ctest --test-dir build -C ${{ env.BUILD_TYPE }} --output-on-failure
        working-directory: PetEduComplete
        continue-on-error: true

      - name: Create AppImage (Linux Package)
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          cp build/PetEdu AppDir/usr/bin/
          # 这里可以添加 linuxdeploy 打包步骤
        working-directory: PetEduComplete
        continue-on-error: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pet-edu-linux
          path: PetEduComplete/install/
          retention-days: 30

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-linux
          path: PetEduComplete/build/CMakeFiles/CMakeOutput.log
          retention-days: 7

  # ============================================
  # 发布 (仅 Release 触发)
  # ============================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pet-edu-windows
          path: release/windows

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pet-edu-linux
          path: release/linux

      - name: Create Windows Package
        run: |
          cd release/windows
          zip -r ../PetEdu-Windows-${{ github.ref_name }}.zip .

      - name: Create Linux Package
        run: |
          cd release/linux
          tar -czvf ../PetEdu-Linux-${{ github.ref_name }}.tar.gz .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/PetEdu-Windows-*.zip
            release/PetEdu-Linux-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 构建状态汇总
  # ============================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: always()
    
    steps:
      - name: Check Build Status
        run: |
          echo "## Build Status Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-windows.result }}" == "success" ]; then
            echo "| Windows | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-windows.result }}" == "failure" ]; then
            echo "| Windows | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Windows | ⚠️ ${{ needs.build-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build-linux.result }}" == "success" ]; then
            echo "| Linux | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.build-linux.result }}" == "failure" ]; then
            echo "| Linux | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux | ⚠️ ${{ needs.build-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          fi
